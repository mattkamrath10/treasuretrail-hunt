<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Primary Meta Tags -->
    <title>Treasure Trail</title>
    <meta name="title" content="Treasure Trail" />
    <meta name="description" content="Discover auctions, estate sales, marketplace finds, and hidden treasures." />
    <meta name="application-name" content="Treasure Trail" />
    <meta name="theme-color" content="#eab308" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Apple touch icon (iPhone home screen, iMessage preview, Safari pinned tab) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Treasure Trail" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Web App Manifest (Android, PWA) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://treasuretrail-hunt.com/" />
    <meta property="og:title" content="Treasure Trail" />
    <meta property="og:description" content="A sourcing and treasure-hunting platform for collectors, flippers, scouts, and hidden gems." />
    <meta property="og:image" content="https://treasuretrail-hunt.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://treasuretrail-hunt.com/" />
    <meta property="twitter:title" content="Treasure Trail" />
    <meta property="twitter:description" content="Discover auctions, estate sales, marketplace finds, and hidden treasures." />
    <meta property="twitter:image" content="https://treasuretrail-hunt.com/og-image.jpg" />

    <!-- Canonical -->
    <link rel="canonical" href="https://treasuretrail-hunt.com/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
