<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>TreasureTrail — Every find tells a story</title>
    <meta name="description" content="Discover hidden treasures, auctions, yard sales, estate sales, rare finds, scouts, and reseller opportunities on TreasureTrail." />
    <meta name="application-name" content="TreasureTrail" />
    <meta name="theme-color" content="#eab308" />
    <meta name="color-scheme" content="light dark" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <!-- Apple touch icon (iPhone home screen, iMessage preview, Safari pinned tab) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TreasureTrail" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Web App Manifest (Android, PWA) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Open Graph (Facebook, iMessage, LinkedIn, Discord, Slack, Messenger) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TreasureTrail" />
    <meta property="og:title" content="TreasureTrail — Every find tells a story" />
    <meta property="og:description" content="Discover hidden treasures, auctions, yard sales, estate sales, rare finds, scouts, and reseller opportunities." />
    <meta property="og:url" content="https://treasuretrail-hunt.com" />
    <meta property="og:image" content="https://treasuretrail-hunt.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://treasuretrail-hunt.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TreasureTrail — Every find tells a story" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TreasureTrail — Every find tells a story" />
    <meta name="twitter:description" content="Discover hidden treasures, auctions, yard sales, estate sales, rare finds, scouts, and reseller opportunities." />
    <meta name="twitter:image" content="https://treasuretrail-hunt.com/og-image.png" />
    <meta name="twitter:image:alt" content="TreasureTrail — Every find tells a story" />

    <!-- Canonical -->
    <link rel="canonical" href="https://treasuretrail-hunt.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
