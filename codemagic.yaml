# Codemagic CI/CD — builds the iOS app on a cloud Mac and ships it to TestFlight.
# You do NOT need a Mac. Everything below runs on Codemagic's macOS instance.
#
# ONE-TIME SETUP IN THE CODEMAGIC WEB UI (cannot be done from code):
#   1. Sign in at https://codemagic.io with your GitHub account and add the
#      repository  mattkamrath10/treasuretrail-hunt.
#   2. Teams/Integrations -> App Store Connect -> add an API key
#      (App Store Connect -> Users and Access -> Integrations -> create key,
#       role: App Manager). Name the integration EXACTLY:  TreasureTrail ASC
#       (or change the name on the `app_store_connect:` line below to match).
#   3. App Store Connect -> your app "TreasureTrail Marketplace" -> App Information
#      -> copy the numeric "Apple ID" and paste it into APP_STORE_APP_ID below.
# Then push this file and press "Start new build" in Codemagic.

workflows:
  ios-testflight:
    name: iOS TestFlight (TreasureTrail)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: TreasureTrail ASC
    environment:
      # Supabase URL + anon key are read by `npm run build` (Vite) and baked into
      # the bundled web app. Without them the app throws on launch (blank screen),
      # because src/lib/supabase.ts calls createClient() at startup.
      # Define BOTH of these in the Codemagic UI under an env-var group named
      # "supabase":  VITE_SUPABASE_URL  and  VITE_SUPABASE_ANON_KEY.
      groups:
        - supabase
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.treasuretrail.hunt"
        APP_STORE_APP_ID: 6774603659
        # Baked into the web bundle that ships inside the native app.
        VITE_API_BASE: "https://treasuretrail-hunt.com"
        VITE_PUBLIC_WEB_URL: "https://treasuretrail-hunt.com"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets (Vite)
        script: npm run build
      - name: Capacitor sync iOS
        script: npx cap sync ios
      - name: Set up code signing (auto-create cert + profile, no Mac/CSR needed)
        script: |
          set -e
          keychain initialize
          # Apple needs a private key to ISSUE an Apple Distribution certificate.
          # Normally that key comes from a CSR you'd make on a Mac. We generate it
          # here instead, so the certificate is created with NO Mac and NO CSR.
          #
          # Apple caps distribution certs (max 2). Generating a FRESH key every
          # build makes a NEW cert every build, which hits that cap and fails with
          # a 409 "you already have a current Distribution certificate". To avoid
          # that forever: save ONE private key in the Codemagic UI as an env var
          # named CERTIFICATE_PRIVATE_KEY (in the "supabase" group, which is
          # already loaded). When present we REUSE it, so the same single cert is
          # reused on every build and no new cert is ever created.
          CERT_KEY=/tmp/cert_private_key.pem
          if [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "Reusing persisted distribution key from CERTIFICATE_PRIVATE_KEY (no new cert will be created)"
            printf '%s' "$CERTIFICATE_PRIVATE_KEY" > "$CERT_KEY"
          else
            echo "No CERTIFICATE_PRIVATE_KEY set -- generating a fresh key (this creates a NEW distribution cert and can hit Apple's 2-cert cap)"
            openssl genrsa -out "$CERT_KEY" 2048
          fi
          echo "=== Fetch/create signing files for $BUNDLE_ID ==="
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:"$CERT_KEY" \
            --create \
            --verbose
          echo "=== Add certificate(s) to keychain ==="
          keychain add-certificates
          echo "=== Provisioning profiles now on the machine: ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo "=== Apply profiles to the Xcode project ==="
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --verbose
      - name: Set build number from TestFlight
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" || echo 0)
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all $(($LATEST + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
