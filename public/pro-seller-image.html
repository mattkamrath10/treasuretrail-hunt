<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Pro Seller Image</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 30%, #2a1a0a, #140b04);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p { font-size: 14px; color: #d9c9b3; margin: 0 0 20px; line-height: 1.5; }
    .preview {
      width: 240px;
      height: 240px;
      max-width: 70vw;
      max-height: 70vw;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: block;
      margin: 0 auto 24px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 700;
      color: #1a1109;
      background: linear-gradient(180deg, #ffd25a, #f4a623);
      border: none;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(244,166,35,0.4);
    }
    .btn:active { transform: translateY(1px); }
    .meta { margin-top: 16px; font-size: 12px; color: #9c8a72; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pro Seller Monthly Image</h1>
    <p>App Store compliant: 1024&times;1024, PNG, RGB, flattened, 72&nbsp;dpi, no rounded corners.</p>
    <img class="preview" src="/pro-seller-image.png" alt="Pro Seller promotional image" />
    <a class="btn" href="/pro-seller-image.png" download="pro-seller-monthly-1024.png">Download Image</a>
    <div class="meta">Tap and hold the image to save it on iPhone if the button doesn&rsquo;t prompt a download.</div>
  </div>
</body>
</html>
